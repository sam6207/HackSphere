<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registration Closed</title>

<style>

body{
margin:0;
padding:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{

background: rgba(255,255,255,0.08);
padding:40px;
border-radius:15px;
text-align:center;
width:400px;
backdrop-filter: blur(10px);
box-shadow:0px 0px 25px rgba(0,0,0,0.4);

}

h1{
color:#ffcc00;
margin-bottom:10px;
}

p{
line-height:1.6;
font-size:16px;
}

.status{
color:#ff4b5c;
font-weight:bold;
font-size:18px;
margin:15px 0;
}

button{

margin-top:20px;
padding:12px 25px;
border:none;
border-radius:8px;
background:#ffcc00;
cursor:pointer;
font-weight:bold;
transition:.3s;

}

button:hover{

background:white;
color:black;

}

</style>

</head>

<body>

<div class="container">

<h1>Registration Closed</h1>

<p class="status">
Sorry! You are late.
</p>

<p>
Thank you for visiting our Hackathon Registration Page.
The registration process has officially been closed and the next phase has started.
</p>

<p>
Best luck for next time  <br>
Please register on time in upcoming events.
</p>

<button onclick="location.href='index.html'">
Go Back
</button>

</div>

</body>
</html>
